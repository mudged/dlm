# Release: tag push (v*) builds embedded UI + cross-compiled binaries and uploads to GitHub Releases.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install web dependencies and sync static export into Go embed tree
        working-directory: web
        run: |
          npm ci
          npm run release:sync

      - name: Create dist directory
        run: mkdir -p dist

      - name: Cross-compile release binaries
        working-directory: backend
        env:
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o ../dist/dlm_linux_arm64 ./cmd/server
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/dlm_linux_amd64 ./cmd/server
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/dlm_windows_amd64.exe ./cmd/server

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dlm_linux_arm64
            dist/dlm_linux_amd64
            dist/dlm_windows_amd64.exe
          generate_release_notes: true
